<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта доверия — Страница 4</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #25282B; 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .editorial-header {
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            background: #F1F3F5; 
            padding: 14px 16px;
            font-size: 11px;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #DDE1E5;
            margin-top: 20px;
        }

        .editorial-header span, .editorial-header a { 
            color: #71777E; 
            text-decoration: none; 
            font-weight: 600; 
        }

        /* Стиль для всех открытых ссылок-дверей в хедере */
        .editorial-header .passed {
            color: #25282B;
        }
        .editorial-header .passed:hover {
            color: #B82E12;
        }
        
        /* Фирменный алый капс текущего шага РАЗРЫВ по вашей закономерности */
        .editorial-header .current { 
            color: #B82E12; 
            font-weight: 700; 
            text-transform: uppercase;
            border-bottom: 2px solid #B82E12; 
            padding-bottom: 2px; 
        }

        .slide-container {
            max-width: 650px; 
            width: 100%;
            position: relative;
            background: url('../bg.jpg') repeat;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            margin: 0 auto 40px auto;
        }

        @media (max-width: 768px) {
            body { background-color: url('../bg.jpg') repeat; } 
            .slide-container { margin: 0 auto; max-width: 100%; box-shadow: none; }
            .editorial-header { max-width: 100%; font-size: 9px; padding: 12px 8px; margin-top: 0; }
        }

        .responsive-img { width: 100%; height: auto; display: block; margin: 0 auto; }

        /* НЕВИДИМАЯ ЗОНА СТРОГО ПОВЕРХ ВАШЕЙ НАРИСОВАННОЙ КНОПКИ "В ЧЁМ ПРИЧИНА?" */
        .clickable-zone {
            position: absolute;
            bottom: 2.1%; 
            left: 31%;
            width: 38%;
            height: 4.2%;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ВЕРХНИЙ МАРШРУТ (Проблема, Симптомы и Сценарии — живые ссылки с UTM-метками) -->
    <div class="editorial-header">
        <a href="../" class="passed">Проблема</a> ➔ 
        <a href="../b1/?utm_source=funnel&utm_medium=header_back&utm_campaign=stage2" class="passed">Симптомы</a> ➔ 
        <a href="../b2/?utm_source=funnel&utm_medium=header_back&utm_campaign=stage2" class="passed">Сценарии</a> ➔ 
        <span class="current">РАЗРЫВ</span> ➔ 
        <span>Причина</span> ➔ 
        <span>Масштаб</span> ➔ 
        <span>Состав</span> ➔ 
        <span>Решение</span>
    </div>

    <div class="slide-container">
        <!-- Код ищет именно этот файл в вашей папке -->
        <img src="hero4.png" alt="Почему одинаковая задача дает разный уровень презентаций" class="responsive-img">
        
        <!-- Невидимый клик переведёт в будущую папку причин b4/ -->
        <a href="../b4/?utm_source=funnel&utm_medium=content_forward&utm_campaign=stage2" class="clickable-zone" title="В чём причина?"></a>
    </div>

</body>
</html>
