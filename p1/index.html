<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта доверия — Эмоциональное пике</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            /* Наш фирменный глубокий индустриальный графит по бокам */
            background-color: #25282B; 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* НАСТРОЙКА СКВOЗНОГО ХЕДЕРА — он закреплен вверху экрана при прокрутке */
        .editorial-header {
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            background: #F1F3F5; 
            padding: 14px 16px;
            font-size: 11px;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #DDE1E5;
            position: sticky;
            top: 0;
            z-index: 100;
            margin-top: 20px;
        }

        .editorial-header span, .editorial-header a { 
            color: #71777E; 
            text-decoration: none; 
            font-weight: 600; 
        }

        .editorial-header .passed { color: #25282B; }
        .editorial-header .passed:hover { color: #B82E12; }
        
        /* РАЗРЫВ монолитно горит алым капсом */
        .editorial-header .current { 
            color: #B82E12; 
            font-weight: 700; 
            text-transform: uppercase;
            border-bottom: 2px solid #B82E12; 
            padding-bottom: 2px; 
        }

        /* Общий контейнер для журнальной ленты */
        .tape-container {
            max-width: 650px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 30px; /* Благородный воздушный разрыв между плакатами */
            margin-bottom: 50px;
        }

        .slide-container {
            width: 100%;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
        }

        /* Первый плакат на светлой бумаге */
        .light-poster { background: url('../bg.jpg') repeat; }
        
        /* Второй плакат в глубокой черной бездне */
        .dark-poster { background-color: #0E0F11; }

        @media (max-width: 768px) {
            .tape-container { max-width: 100%; gap: 15px; }
            .editorial-header { max-width: 100%; font-size: 9px; padding: 12px 8px; margin-top: 0; }
        }

        .responsive-img { width: 100%; height: auto; display: block; margin: 0 auto; }
    </style>
</head>
<body>

    <!-- НАША СКВOЗНАЯ НАВИГАЦИЯ -->
    <div class="editorial-header">
        <a href="../" class="passed">Проблема</a> ➔ 
        <a href="../b1/?utm_source=funnel&utm_medium=header_back&utm_campaign=stage2" class="passed">Симптомы</a> ➔ 
        <span class="current">РАЗРЫВ</span> ➔ 
        <span>Причина</span> ➔ 
        <span>Масштаб</span> ➔ 
        <span>Состав</span> ➔ 
        <span>Решение</span>
    </div>

    <!-- ВЕРТИКАЛЬНАЯ ЛЕНТА ИЗ ДВУХ ПОСТЕРОВ -->
    <div class="tape-container">
        
        <!-- ПЕРВЫЙ КУСОК ЛЕНТЫ: Постер 2.1 (Светлый) -->
        <div class="slide-container light-poster">
            <img src="hero5.png" alt="От меня ждут уровень целого отдела" class="responsive-img">
        </div>

        <!-- ВТОРОЙ КУСОК ЛЕНТЫ: Постер 2.2 (Черный) -->
        <div class="slide-container dark-poster">
            <img src="hero6.png" alt="И технологии не спасают" class="responsive-img">
        </div>

    </div>

</body>
</html>
