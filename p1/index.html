<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта доверия — Шаг 3: Причина</title>
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #25282B; margin: 0; padding: 0; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* ИНЖЕНЕРНЫЙ ХЕДЕР */
        .editorial-header { width: 100%; max-width: 650px; box-sizing: border-box; background: #F1F3F5; padding: 18px 16px; font-size: 11px; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #DDE1E5; margin-top: 20px; z-index: 100; position: relative; }
        .editorial-header::before { content: ""; position: absolute; top: 23px; left: 35px; right: 35px; height: 1px; border-top: 1px dashed #CDD2D7; z-index: 1; }
        
        .step-node { display: flex; flex-direction: column; align-items: center; position: relative; z-index: 2; text-decoration: none; width: 14%; }
        .node-dot { width: 6px; height: 6px; background-color: #FFF; border: 2px solid #A1A8B0; border-radius: 50%; margin-bottom: 8px; transition: all 0.3s ease; }
        .step-node span { color: #A1A8B0; font-weight: 600; transition: color 0.3s; text-align: center; }
        
        .step-node.passed .node-dot { background-color: #25282B; border-color: #25282B; }
        .step-node.passed span { color: #25282B; }
        .step-node.passed:hover span { color: #B82E12; }
        
        .step-node.current .node-dot { background-color: #B82E12; border-color: #B82E12; box-shadow: 0 0 0 3px rgba(184, 46, 18, 0.2); }
        .step-node.current span { color: #B82E12; font-weight: 700; text-transform: uppercase; }
        
        .step-node.future:hover .node-dot { border-color: #B82E12; background-color: #B82E12; }
        .step-node.future:hover span { color: #B82E12; }

        /* ИСПРАВЛЕННАЯ АДАПТИВНАЯ СЦЕНА БЕЗ ЖЁСТКОЙ ВЫСОТЫ */
        .stage-area { max-width: 650px; width: 100%; position: relative; aspect-ratio: 3/4; margin: 0 auto 40px auto; }
        .slide-container { width: 100%; height: 100%; position: absolute; top: 0; left: 0; box-shadow: 0 10px 40px rgba(0,0,0,0.3); transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease; }
        
        .poster-light { background: url('../bg.jpg') repeat; z-index: 10; opacity: 1; transform: scale(1); }
        .poster-dark { background-color: #0E0F11; z-index: 5; opacity: 0; transform: translateY(50px) scale(0.98); }
        .stage-area.abyss .poster-light { opacity: 0; transform: scale(0.95); pointer-events: none; }
        .stage-area.abyss .poster-dark { opacity: 1; transform: translateY(0) scale(1); z-index: 20; }
        
        @media (max-width: 768px) { body { background-color: url('../bg.jpg') repeat; } .editorial-header { max-width: 100%; font-size: 8px; padding: 14px 4px; margin-top: 0; } .editorial-header::before { top: 19px; left: 20px; right: 20px; } .node-dot { width: 4px; height: 4px; margin-bottom: 4px; } }
        .responsive-img { width: 100%; height: auto; display: block; margin: 0 auto; }
        .ai-trigger-zone { position: absolute; bottom: 3.5%; left: 25%; width: 50%; height: 4.5%; display: block; cursor: pointer; z-index: 30; }
    </style>
</head>
<body>
    <div class="editorial-header">
        <a href="../" class="step-node passed"><div class="node-dot"></div><span>Проблема</span></a>
        <a href="../b1/?utm_source=funnel&utm_medium=header&utm_campaign=st4" class="step-node passed"><div class="node-dot"></div><span>Симптомы</span></a>
        <a href="../b3/?utm_source=funnel&utm_medium=header&utm_campaign=st4" class="step-node passed"><div class="node-dot"></div><span>Разрыв</span></a>
        <div class="step-node current"><div class="node-dot"></div><span>Причина</span></div>
        <a href="../b4/?utm_source=funnel&utm_medium=header&utm_campaign=st4" class="step-node future"><div class="node-dot"></div><span>Масштаб</span></a>
        <a href="../b6/?utm_source=funnel&utm_medium=header&utm_campaign=st4" class="step-node future"><div class="node-dot"></div><span>Состав</span></a>
        <a href="../demo/?utm_source=funnel&utm_medium=header&utm_campaign=st4" class="step-node future"><div class="node-dot"></div><span>Решение</span></a>
    </div>
    <div class="stage-area" id="funnelStage">
        <div class="slide-container poster-light">
            <img src="hero5.png" alt="Постер 2.1" class="responsive-img">
            <div class="ai-trigger-zone" onclick="diveIntoAbyss()" title="Добавляют ИИ"></div>
        </div>
        <div class="slide-container poster-dark">
            <img src="hero6.png" alt="Постер 2.2" class="responsive-img">
        </div>
    </div>
    <script>function diveIntoAbyss() { document.getElementById('funnelStage').classList.add('abyss'); }</script>
</body>
</html>
