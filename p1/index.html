<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта доверия — Шаг 3: Причина</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background-color: #25282B; 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .editorial-header {
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            background: #F1F3F5; 
            padding: 14px 16px;
            font-size: 11px;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #DDE1E5;
            margin-top: 20px;
            z-index: 100;
        }

        .editorial-header span, .editorial-header a { 
            color: #71777E; 
            text-decoration: none; 
            font-weight: 600; 
        }

        /* Стиль для открытых дверей назад */
        .editorial-header .passed { color: #25282B; }
        .editorial-header .passed:hover { color: #B82E12; }
        
        /* ПРИЧИНА горит алым капсом на четвертом месте маршрута */
        .editorial-header .current { 
            color: #B82E12; 
            font-weight: 700; 
            text-transform: uppercase;
            border-bottom: 2px solid #B82E12; 
            padding-bottom: 2px; 
        }

        /* Стиль для будущих заблокированных дверей */
        .editorial-header .locked { color: #A1A8B0; cursor: not-allowed; }

        .stage-area {
            max-width: 650px;
            width: 100%;
            position: relative;
            height: 866px; 
            margin: 10px auto 40px auto;
        }

        .slide-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.8s ease;
        }

        .poster-light { background: url('../bg.jpg') repeat; z-index: 10; opacity: 1; transform: scale(1); }
        .poster-dark { background-color: #0E0F11; z-index: 5; opacity: 0; transform: translateY(50px) scale(0.98); }

        .stage-area.abyss .poster-light { opacity: 0; transform: scale(0.95); pointer-events: none; }
        .stage-area.abyss .poster-dark { opacity: 1; transform: translateY(0) scale(1); z-index: 20; }

        @media (max-width: 768px) {
            .stage-area { max-width: 100%; height: auto; aspect-ratio: 3/4; }
            .editorial-header { max-width: 100%; font-size: 9px; padding: 12px 8px; margin-top: 0; }
        }

        .responsive-img { width: 100%; height: auto; display: block; margin: 0 auto; }

        .ai-trigger-zone {
            position: absolute;
            bottom: 3.5%; 
            left: 25%;
            width: 50%;
            height: 4.5%;
            display: block;
            cursor: pointer;
            z-index: 30;
        }
    </style>
</head>
<body>

    <!-- ИСТИННЫЙ МАРШРУТ (ПРИЧИНА горит алым капсом) -->
    <div class="editorial-header">
        <a href="../" class="passed">Проблема</a> ➔ 
        <a href="../b1/?utm_source=funnel&utm_medium=header_back&utm_campaign=stage3" class="passed">Симптомы</a> ➔ 
        <a href="../b3/?utm_source=funnel&utm_medium=header_back&utm_campaign=stage3" class="passed">Разрыв</a> ➔ 
        <span class="current">ПРИЧИНА</span> ➔ 
        <span class="locked">Масштаб</span> ➔ 
        <span class="locked">Состав</span> ➔ 
        <span class="locked">Решение</span>
    </div>

    <div class="stage-area" id="funnelStage">
        
        <!-- СВЕТЛЫЙ ПОСТЕР 2.1 -->
        <div class="slide-container poster-light">
            <img src="hero5.png" alt="От меня ждут уровень целого отдела" class="responsive-img">
            <div class="ai-trigger-zone" onclick="diveIntoAbyss()" title="Добавляют ИИ"></div>
        </div>

        <!-- ЧЕРНЫЙ ПОСТЕР 2.2 (БЕЗДНА) -->
        <div class="slide-container poster-dark">
            <img src="hero6.png" alt="И технологии не спасают" class="responsive-img">
        </div>

    </div>

    <script>
        function diveIntoAbyss() {
            document.getElementById('funnelStage').classList.add('abyss');
        }
    </script>

</body>
</html>
