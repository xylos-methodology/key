<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта доверия — Страница 1</title>
    
    <!-- Подключаем чистый швейцарский шрифт Inter -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            /* Красим бока в благородный глубокий индустриальный графит */
            background-color: #25282B; 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* НАСТРОЙКА ХЕДЕРА — светлая платина лежит поверх плаката */
        .editorial-header {
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            background: #F1F3F5; 
            padding: 14px 16px;
            font-size: 11px;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #DDE1E5;
            margin-top: 20px;
        }

        /* Общие стили для всех шагов навигации */
        .editorial-header span, .editorial-header a { 
            color: #71777E; 
            text-decoration: none; 
            font-weight: 600; 
        }
        
        /* Фирменный алый капс для текущего шага ПРОБЛЕМА */
        .editorial-header .current { 
            color: #B82E12; 
            font-weight: 700; 
            text-transform: uppercase;
            border-bottom: 2px solid #B82E12; 
            padding-bottom: 2px; 
        }

        /* Стиль для открытой двери (Симптомы) */
        .editorial-header .unlocked { 
            color: #71777E; 
            text-decoration: none; 
            font-weight: 600; 
        }
        .editorial-header .unlocked:hover { 
            color: #B82E12; 
        }

        .slide-container {
            max-width: 650px; 
            width: 100%;
            position: relative;
            /* Наша светлая газетная текстура живет строго ВНУТРИ рамки плаката */
            background: url('bg.jpg') repeat;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); /* Плотная тень, отрывающая плакат от черного фона */
            margin: 0 auto 40px auto;
        }

        /* УМНОЕ МОБИЛЬНОЕ ПРАВИЛО: на смартфонах убираем темные бока и прижимаем к краям */
        @media (max-width: 768px) {
            body { background-color: url('bg.jpg') repeat; } 
            .slide-container { margin: 0 auto; max-width: 100%; box-shadow: none; }
            .editorial-header { max-width: 100%; font-size: 9px; padding: 12px 8px; margin-top: 0; }
        }

        .responsive-img { width: 100%; height: auto; display: block; margin: 0 auto; }

        /* НЕВИДИМАЯ ЗОНА СТРОГО ПОВЕРХ ВАШЕЙ НАРИСОВАННОЙ КНОПКИ "РАЗОБРАТЬСЯ" */
        .clickable-zone {
            position: absolute;
            bottom: 4.8%; 
            left: 31%;
            width: 38%;
            height: 4.5%;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ВЕРХНИЙ МАРШРУТ (ПРОБЛЕМА горит алым капсом, а Симптомы — открытая дверь-ссылка с UTM-меткой) -->
    <!-- ВЕРХНИЙ МАРШРУТ СТРАНИЦЫ 1 (ПРОБЛЕМА горит алым капсом, остальные — открытые двери вперёд) -->
    <div class="editorial-header">
        <span class="current">ПРОБЛЕМА</span> ➔ 
        <a href="b1/?utm_source=funnel&utm_medium=header_forward&utm_campaign=stage1" class="passed">Симптомы</a> ➔ 
        <a href="b3/?utm_source=funnel&utm_medium=header_forward&utm_campaign=stage1" class="passed">Разрыв</a> ➔ 
        <a href="p1/?utm_source=funnel&utm_medium=header_forward&utm_campaign=stage1" class="passed">Причина</a> ➔ 
        <a href="b4/?utm_source=funnel&utm_medium=header_forward&utm_campaign=stage1" class="passed">Масштаб</a> ➔ 
        <a href="b6/?utm_source=funnel&utm_medium=header_forward&utm_campaign=stage1" class="passed">Состав</a> ➔ 
        <a href="demo/?utm_source=funnel&utm_medium=header_forward&utm_campaign=stage1" class="passed">Решение</a>
    </div>


    <!-- ЧИСТЫЙ МОНОЛИТНЫЙ ПЛАКАТ СТРАНИЦЫ 1 -->
    <div class="slide-container">
        <img src="hero.png" alt="Сильная команда выдает слабые презентации" class="responsive-img">
        
        <!-- Невидимый No-code переход в папку b1/ (на Страницу 2) -->
        <a href="b1/" class="clickable-zone" title="Разобраться"></a>
    </div>

</body>
</html>
