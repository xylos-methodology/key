<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта доверия — Страница 1</title>
    
    <style>
        body {
            /* Проверяем жесткую привязку к нашей картинке фона */
            background: url('bg.jpg') repeat; 
            margin: 0;
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .slide-container {
            max-width: 800px;
            width: 100%;
            position: relative;
        }

        .responsive-img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        /* Кликабельная зона поверх вашей алой кнопки */
        .clickable-zone {
            position: absolute;
            bottom: 3.5%; 
            left: 22%;
            width: 56%;
            height: 5%;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <!-- Код ищет именно этот файл в вашей папке -->
        <img src="hero.png" alt="Сильная команда выдает слабые презентации" class="responsive-img">
        
        <!-- Ссылка на будущую Страницу 2 -->
        <a href="b1/" class="clickable-zone" title="Продолжить исследование"></a>
    </div>

</body>
</html>
