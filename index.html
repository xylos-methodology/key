<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Карта доверия — Страница 1</title>
    
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            background: url('bg.jpg') repeat; 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* НАСТРОЙКА ЧИСТОГО ВЕРХНЕГО ХЕДЕРА */
        .editorial-header {
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            background: rgba(241, 243, 245, 0.9); 
            padding: 14px 16px;
            font-size: 11px;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #DDE1E5;
            margin-top: 10px;
        }

        .editorial-header span, .editorial-header a { 
            color: #71777E; 
            text-decoration: none; 
            font-weight: 600; 
        }
        
        /* Фирменный алый капс для текущего шага ПРОБЛЕМА */
        .editorial-header .current { 
            color: #B82E12; 
            font-weight: 700; 
            text-transform: uppercase;
            border-bottom: 2px solid #B82E12; 
            padding-bottom: 2px; 
        }

        .slide-container {
            max-width: 650px; 
            width: 100%;
            position: relative;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin: 10px auto 40px auto;
        }

        @media (max-width: 768px) {
            .slide-container { margin: 0 auto; max-width: 100%; }
            .editorial-header { max-width: 100%; font-size: 9px; padding: 12px 8px; }
        }

        .responsive-img { width: 100%; height: auto; display: block; margin: 0 auto; }

        /* НЕВИДИМАЯ ЗОНА СТРОГО ПОВЕРХ ВАШЕЙ НАРИСОВАННОЙ КНОПКИ "РАЗОБРАТЬСЯ" */
        .clickable-zone {
            position: absolute;
            bottom: 4.8%; /* Попиксельно прижали точно к вашей алой плашке */
            left: 31%;
            width: 38%;
            height: 4.5%;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ВЕРХНИЙ МАРШРУТ (ПРОБЛЕМА горит алым капсом, остальные приглушены) -->
    <div class="editorial-header">
        <span class="current">ПРОБЛЕМА</span> ➔ 
        <span>Симптомы</span> ➔ 
        <span>Разрыв</span> ➔ 
        <span>Причина</span> ➔ 
        <span>Масштаб</span> ➔ 
        <span>Состав</span> ➔ 
        <span>Решение</span>
    </div>

    <!-- ЧИСТЫЙ МОНОЛИТНЫЙ ПЛАКАТ СТРАНИЦЫ 1 -->
    <div class="slide-container">
        <img src="hero.png" alt="Сильная команда выдает слабые презентации" class="responsive-img">
        
        <!-- Невидимый No-code переход в папку b1/ (на Страницу 2) -->
        <a href="b1/" class="clickable-zone" title="Разобраться"></a>
    </div>

</body>
</html>
