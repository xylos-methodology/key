<!DOCTYPE html>

    <title>Карта доверия — Шаг 7: Решение</title>
    
    <!-- Подключаем чистый швейцарский шрифт Inter -->
    <link rel="preconnect" href="https://googleapis.com">
    <link rel="preconnect" href="https://gstatic.com" crossorigin>
    <link href="https://googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            /* Наш фирменный благородный графит по бокам */
            background-color: #25282B; 
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* НАСТРОЙКА СКВOЗНОГО ХЕДЕРА — платина лежит поверх плаката */
        .editorial-header {
            width: 100%;
            max-width: 650px;
            box-sizing: border-box;
            background: #F1F3F5; 
            padding: 14px 16px;
            font-size: 11px;
            letter-spacing: 0.05em;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #DDE1E5;
            margin-top: 20px;
        }

        .editorial-header span, .editorial-header a { 
            color: #71777E; 
            text-decoration: none; 
            font-weight: 600; 
        }

        /* Все прошлые шаги воронки активны и кликабельны назад */
        .editorial-header .passed {
            color: #25282B;
        }
        .editorial-header .passed:hover {
            color: #B82E12;
        }
        
        /* РЕШЕНИЕ — финальная точка маршрута вспыхивает алым капсом */
        .editorial-header .current { 
            color: #B82E12; 
            font-weight: 700; 
            text-transform: uppercase;
            border-bottom: 2px solid #B82E12; 
            padding-bottom: 2px; 
        }

        .slide-container {
            max-width: 650px; 
            width: 100%;
            position: relative;
            background: url('../bg.jpg') repeat;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            margin: 0 auto 40px auto;
        }

        @media (max-width: 768px) {
            body { background-color: url('../bg.jpg') repeat; } 
            .slide-container { margin: 0 auto; max-width: 100%; box-shadow: none; }
            .editorial-header { max-width: 100%; font-size: 9px; padding: 12px 8px; margin-top: 0; }
        }

        .responsive-img { width: 100%; height: auto; display: block; margin: 0 auto; }

        /* НЕВИДИМАЯ ЗОНА СТРОГО ПОВЕРХ ВАШЕЙ ФИНАЛЬНОЙ НАРИСОВАННОЙ КНОПКИ ЗАПИСИ НА АУДИТ */
        .clickable-zone {
            position: absolute;
            bottom: 3.5%; /* Координаты приземления на финишную кнопку плаката */
            left: 20%;
            width: 60%;
            height: 5%;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

        <!-- ВЕРХНИЙ МАРШРУТ СТРАНИЦЫ ДЕМОНСТРАЦИИ (РЕШЕНИЕ горит алым капсом) -->
    <div class="editorial-header">

        <span class="current">РЕШЕНИЕ</span>
    </div>

    <div class="slide-container">
